<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RenderBridge AI</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #20242a;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 650;
      }

      p {
        margin: 0;
        color: #59616d;
        line-height: 1.5;
      }

      .preview {
        display: grid;
        min-height: 220px;
        place-items: center;
        border: 1px dashed #aeb7c2;
        border-radius: 8px;
        background: #ffffff;
        color: #687384;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RenderBridge AI</h1>
      <p>SketchUp plugin shell is ready. The render controls will be connected in the next step.</p>
      <section class="preview" aria-label="Render preview">Preview area</section>
    </main>
  </body>
</html>
